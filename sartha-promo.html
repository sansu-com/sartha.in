<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; }

.sartha-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 52px;
  background: linear-gradient(90deg, #0f172a, #1e293b);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 10px;
  font-family: Arial;
}

.sartha-text {
  color: #fff;
  font-size: 12px;
  max-width: 70%;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.sartha-btn {
  background: #22c55e;
  color: #fff;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  text-decoration: none;
  font-weight: bold;
}
</style>
</head>

<body>

<div id="ad"></div>

<script src="https://cdn.jsdelivr.net/gh/sansu-com/sartha.in/sartha-promo.js"></script>

</body>
</html>
