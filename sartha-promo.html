<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
}

.sartha-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 52px;
  background: linear-gradient(90deg, #0f172a, #1e293b);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 10px;
  font-family: Arial, sans-serif;
  box-sizing: border-box;
}

.sartha-text {
  color: #fff;
  font-size: 12px;
  max-width: 70%;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.sartha-btn {
  background: #22c55e;
  color: #fff;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  text-decoration: none;
  font-weight: bold;
}
</style>

</head>

<body>

<div id="ad"></div>

<script>
document.addEventListener("DOMContentLoaded", function () {

const promos = [
  {
    text: "🎓 SARTHA Counselling – Personal Mentor till Admission",
    btn: "Apply",
    link: "https://wa.me/91XXXXXXXXXX"
  },
  {
    text: "🔥 NEET 2026 Counselling Started – Secure Govt Seat",
    btn: "Join",
    link: "https://wa.me/91XXXXXXXXXX"
  },
  {
    text: "📊 AIIMS & GMC Preference List + Verified Cutoffs",
    btn: "Get List",
    link: "https://wa.me/91XXXXXXXXXX"
  }
];

let ad = promos[Math.floor(Math.random() * promos.length)];

let container = document.getElementById("ad");

if(container){
  container.innerHTML = `
    <div class="sartha-bar">
      <div class="sartha-text">${ad.text}</div>
      <a href="${ad.link}" class="sartha-btn">${ad.btn}</a>
    </div>
  `;
}

});
</script>

</body>
</html>
